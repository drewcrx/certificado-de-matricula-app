version: '3.8'

services:

  postgres:
    image: postgres:16
    container_name: yavirac-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: yavirac
      POSTGRES_PASSWORD: yavirac2026
      POSTGRES_DB: yavirac
      TZ: America/Guayaquil
      PGTZ: America/Guayaquil
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql   # crea tablas + datos de prueba al primer arranque
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yavirac"]
      interval: 5s
      timeout: 5s
      retries: 10

  n8n:
    image: n8nio/n8n:latest
    container_name: yavirac-n8n
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Base de datos interna de n8n (guarda workflows, credenciales, etc.)
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: yavirac
      DB_POSTGRESDB_USER: yavirac
      DB_POSTGRESDB_PASSWORD: yavirac2026
      DB_POSTGRESDB_SCHEMA: n8n        # esquema separado para que n8n no pise las tablas de la app
      # Zona horaria de Ecuador — evita que fechas/horas (tickets, certificados,
      # cron, auditoría) se calculen en UTC y queden un día adelantadas/atrasadas.
      GENERIC_TIMEZONE: America/Guayaquil
      TZ: America/Guayaquil
      # URL pública de n8n (necesaria para que los webhooks tengan URL correcta)
      WEBHOOK_URL: http://localhost:5678/
      N8N_HOST: localhost
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      # Permitir peticiones desde la app Angular en desarrollo
      N8N_CORS_ENABLE: "true"
      N8N_CORS_ALLOWED_ORIGINS: "http://localhost:4200"
      # Desactiva telemetría
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_VERSION_NOTIFICATIONS_ENABLED: "false"
      # Por defecto n8n solo permite leer/escribir archivos dentro de ~/.n8n-files;
      # autorizamos también /data/storage (fotos de incidencias de laboratorio).
      N8N_RESTRICT_FILE_ACCESS_TO: "/data/storage"
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
      - uploads_data:/data/storage   # fotos de incidencias de laboratorio (adjuntos.ruta)

volumes:
  postgres_data:
  n8n_data:
  uploads_data:
